  <text x="360" y="156" text-anchor="middle" dominant-baseline="central" fill="rgb(90, 140, 200)" font-size="11" font-family="system-ui, sans-serif">Contrato entre adaptador e application service — o domínio não sabe quem chama</text>

  <!-- ── CAMADA 3: BOUNDED CONTEXTS (domínio + application) ── -->

  <!-- linha 1 -->
  <rect x="40" y="196" width="196" height="86" rx="8" fill="rgb(55, 47, 130)" stroke="rgb(160, 154, 230)" stroke-width="0.5"/>
