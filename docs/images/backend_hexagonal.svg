  <text x="360" y="454" text-anchor="middle" dominant-baseline="central" fill="rgb(90, 140, 200)" font-size="11" font-family="system-ui, sans-serif">RepositoryPort · StoragePort — definidas pelo domínio, implementadas pelos adaptadores</text>

  <!-- ── CAMADA 5: ADAPTADORES DE SAÍDA ── -->
  <rect x="40" y="492" width="305" height="52" rx="8" fill="rgb(88, 50, 5)" stroke="rgb(220, 145, 35)" stroke-width="0.5"/>
  <text x="192" y="512" text-anchor="middle" dominant-baseline="central" fill="rgb(245, 195, 110)" font-size="13" font-weight="500" font-family="system-ui, sans-serif">Adaptador JPA → PostgreSQL</text>
  <text x="192" y="530" text-anchor="middle" dominant-baseline="central" fill="rgb(220, 145, 35)" font-size="11" font-family="system-ui, sans-serif">Spring Data JPA · implementa RepositoryPort</text>

  <rect x="365" y="492" width="315" height="52" rx="8" fill="rgb(88, 50, 5)" stroke="rgb(220, 145, 35)" stroke-width="0.5"/>
  <text x="522" y="512" text-anchor="middle" dominant-baseline="central" fill="rgb(245, 195, 110)" font-size="13" font-weight="500" font-family="system-ui, sans-serif">Adaptador Garage S3 → Storage</text>
  <text x="522" y="530" text-anchor="middle" dominant-baseline="central" fill="rgb(220, 145, 35)" font-size="11" font-family="system-ui, sans-serif">AWS SDK S3-compat. · implementa StoragePort</text>

  <!-- ══ SETAS ══ -->

  <!-- Adaptador entrada → porta entrada -->
  <line x1="360" y1="106" x2="360" y2="124" marker-end="url(#arrow)" stroke="rgb(156, 154, 146)" stroke-width="1.5"/>

  <!-- Porta entrada → bounded contexts linha 1 -->
  <line x1="138" y1="168" x2="138" y2="194" marker-end="url(#arrow)" stroke="rgb(156, 154, 146)" stroke-width="1.5"/>
  <line x1="350" y1="168" x2="350" y2="194" marker-end="url(#arrow)" stroke="rgb(156, 154, 146)" stroke-width="1.5"/>
  <line x1="562" y1="168" x2="562" y2="194" marker-end="url(#arrow)" stroke="rgb(156, 154, 146)" stroke-width="1.5"/>

  <!-- Porta entrada → bounded contexts linha 2 (via linha horizontal guia) -->
  <polyline points="138,168 138,183 360,183 350,183 350,308" fill="none" stroke="none"/>
  <line x1="138" y1="168" x2="138" y2="308" marker-end="url(#arrow)" stroke="rgb(156, 154, 146)" stroke-width="1.5" stroke-dasharray="3 2"/>
  <line x1="350" y1="282" x2="350" y2="308" marker-end="url(#arrow)" stroke="rgb(156, 154, 146)" stroke-width="1.5" stroke-dasharray="3 2"/>
  <line x1="562" y1="282" x2="562" y2="308" marker-end="url(#arrow)" stroke="rgb(156, 154, 146)" stroke-width="1.5" stroke-dasharray="3 2"/>

  <!-- Catálogo → Streaming (dependência entre contexts via porta) -->
  <line x1="252" y1="248" x2="236" y2="320" marker-end="url(#arrow-dim)" stroke="rgb(120, 118, 110)" stroke-width="1.2" stroke-dasharray="4 3"/>

  <!-- Bounded contexts → porta saída (todos convergem) -->
  <!-- linha 1 -->
  <line x1="138" y1="282" x2="138" y2="414"/>
  <line x1="138" y1="414" x2="359" y2="414"/>
  <line x1="359" y1="414" x2="359" y2="422" marker-end="url(#arrow)" stroke="rgb(156, 154, 146)" stroke-width="1.5"/>
  <line x1="562" y1="282" x2="562" y2="414"/>
  <line x1="562" y1="414" x2="361" y2="414"/>
  <!-- linha 2 -->
  <line x1="138" y1="396" x2="138" y2="414"/>
  <line x1="350" y1="396" x2="350" y2="414"/>
  <line x1="562" y1="396" x2="562" y2="414"/>

  <!-- Porta saída → adaptadores saída -->
  <line x1="192" y1="466" x2="192" y2="490" marker-end="url(#arrow)" stroke="rgb(156, 154, 146)" stroke-width="1.5"/>
  <line x1="522" y1="466" x2="522" y2="490" marker-end="url(#arrow)" stroke="rgb(156, 154, 146)" stroke-width="1.5"/>

  <!-- ── LEGENDA ── -->
  <line x1="42" y1="590" x2="68" y2="590" stroke="rgb(156, 154, 146)" stroke-width="1.5"/>
  <text x="74" y="594" fill="rgb(180, 178, 169)" font-size="11" font-family="system-ui, sans-serif">chamada direta</text>
  <line x1="185" y1="590" x2="211" y2="590" stroke="rgb(156, 154, 146)" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="217" y="594" fill="rgb(180, 178, 169)" font-size="11" font-family="system-ui, sans-serif">via porta (inversão de dependência)</text>
  <line x1="430" y1="590" x2="456" y2="590" stroke="rgb(120, 118, 110)" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="462" y="594" fill="rgb(180, 178, 169)" font-size="11" font-family="system-ui, sans-serif">dependência entre contexts</text>
</svg>
