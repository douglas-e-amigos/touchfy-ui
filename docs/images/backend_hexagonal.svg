  <text x="138" y="244" text-anchor="middle" dominant-baseline="central" fill="rgb(160, 154, 230)" font-size="11" font-family="system-ui, sans-serif">domain · application</text>
  <text x="138" y="261" text-anchor="middle" dominant-baseline="central" fill="rgb(160, 154, 230)" font-size="11" font-family="system-ui, sans-serif">login · roles · perfis</text>

  <rect x="252" y="196" width="196" height="86" rx="8" fill="rgb(55, 47, 130)" stroke="rgb(160, 154, 230)" stroke-width="0.5"/>
  <text x="350" y="224" text-anchor="middle" dominant-baseline="central" fill="rgb(200, 196, 246)" font-size="13" font-weight="500" font-family="system-ui, sans-serif">Catálogo</text>
  <text x="350" y="244" text-anchor="middle" dominant-baseline="central" fill="rgb(160, 154, 230)" font-size="11" font-family="system-ui, sans-serif">domain · application</text>
  <text x="350" y="261" text-anchor="middle" dominant-baseline="central" fill="rgb(160, 154, 230)" font-size="11" font-family="system-ui, sans-serif">músicas · álbuns · artistas</text>

  <rect x="464" y="196" width="196" height="86" rx="8" fill="rgb(55, 47, 130)" stroke="rgb(160, 154, 230)" stroke-width="0.5"/>
  <text x="562" y="224" text-anchor="middle" dominant-baseline="central" fill="rgb(200, 196, 246)" font-size="13" font-weight="500" font-family="system-ui, sans-serif">Playlists</text>
  <text x="562" y="244" text-anchor="middle" dominant-baseline="central" fill="rgb(160, 154, 230)" font-size="11" font-family="system-ui, sans-serif">domain · application</text>
  <text x="562" y="261" text-anchor="middle" dominant-baseline="central" fill="rgb(160, 154, 230)" font-size="11" font-family="system-ui, sans-serif">CRUD · ordenação</text>

  <!-- linha 2 -->
  <rect x="40" y="310" width="196" height="86" rx="8" fill="rgb(6, 70, 57)" stroke="rgb(80, 192, 155)" stroke-width="0.5"/>
  <text x="138" y="338" text-anchor="middle" dominant-baseline="central" fill="rgb(145, 220, 195)" font-size="13" font-weight="500" font-family="system-ui, sans-serif">Streaming / Player</text>
  <text x="138" y="358" text-anchor="middle" dominant-baseline="central" fill="rgb(80, 192, 155)" font-size="11" font-family="system-ui, sans-serif">domain · application</text>
  <text x="138" y="375" text-anchor="middle" dominant-baseline="central" fill="rgb(80, 192, 155)" font-size="11" font-family="system-ui, sans-serif">presigned URL · seek</text>

  <rect x="252" y="310" width="196" height="86" rx="8" fill="rgb(6, 70, 57)" stroke="rgb(80, 192, 155)" stroke-width="0.5"/>
  <text x="350" y="338" text-anchor="middle" dominant-baseline="central" fill="rgb(145, 220, 195)" font-size="13" font-weight="500" font-family="system-ui, sans-serif">Busca</text>
  <text x="350" y="358" text-anchor="middle" dominant-baseline="central" fill="rgb(80, 192, 155)" font-size="11" font-family="system-ui, sans-serif">domain · application</text>
  <text x="350" y="375" text-anchor="middle" dominant-baseline="central" fill="rgb(80, 192, 155)" font-size="11" font-family="system-ui, sans-serif">full-text · filtros</text>

  <rect x="464" y="310" width="196" height="86" rx="8" fill="rgb(6, 70, 57)" stroke="rgb(80, 192, 155)" stroke-width="0.5"/>
  <text x="562" y="338" text-anchor="middle" dominant-baseline="central" fill="rgb(145, 220, 195)" font-size="13" font-weight="500" font-family="system-ui, sans-serif">Histórico / Curtidas</text>
  <text x="562" y="358" text-anchor="middle" dominant-baseline="central" fill="rgb(80, 192, 155)" font-size="11" font-family="system-ui, sans-serif">domain · application</text>
  <text x="562" y="375" text-anchor="middle" dominant-baseline="central" fill="rgb(80, 192, 155)" font-size="11" font-family="system-ui, sans-serif">eventos · likes</text>

  <!-- ── CAMADA 4: PORTAS DE SAÍDA ── -->
  <rect x="40" y="424" width="640" height="42" rx="8" fill="rgb(28, 48, 72)" stroke="rgb(90, 140, 200)" stroke-width="0.5"/>
