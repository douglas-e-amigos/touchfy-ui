  </defs>

  <!-- Envelope geral -->
  <rect x="20" y="20" width="680" height="598" rx="16" fill="none" stroke="rgba(222, 220, 209, 0.3)" stroke-width="0.5" stroke-dasharray="6 4"/>
  <text x="360" y="40" text-anchor="middle" fill="rgb(194, 192, 182)" font-size="12" font-family="system-ui, sans-serif">Backend — Arquitetura Hexagonal (Ports &amp; Adapters)</text>

  <!-- ── CAMADA 1: ADAPTADORES DE ENTRADA ── -->
  <rect x="40" y="54" width="640" height="52" rx="8" fill="rgb(55, 55, 52)" stroke="rgb(180, 178, 169)" stroke-width="0.5"/>
  <text x="360" y="73" text-anchor="middle" dominant-baseline="central" fill="rgb(211, 209, 199)" font-size="13" font-weight="600" font-family="system-ui, sans-serif">Adaptadores de Entrada</text>
  <text x="360" y="91" text-anchor="middle" dominant-baseline="central" fill="rgb(160, 158, 150)" font-size="11" font-family="system-ui, sans-serif">Controllers REST · Spring Security (JWT filter, CORS, autorização por role)</text>

  <!-- ── CAMADA 2: PORTAS DE ENTRADA ── -->
  <rect x="40" y="126" width="640" height="42" rx="8" fill="rgb(28, 48, 72)" stroke="rgb(90, 140, 200)" stroke-width="0.5"/>
