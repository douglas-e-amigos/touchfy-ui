<svg width="100%" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Sistema central -->
  <rect x="240" y="150" width="200" height="80" rx="12" fill="rgb(60, 52, 137)" stroke="rgb(175, 169, 236)" stroke-width="0.5"/>
  <text x="340" y="183" text-anchor="middle" dominant-baseline="central" fill="rgb(206, 203, 246)" font-size="14" font-weight="500" font-family="system-ui, sans-serif">Sistema Touchfy</text>
  <text x="340" y="205" text-anchor="middle" dominant-baseline="central" fill="rgb(175, 169, 236)" font-size="12" font-family="system-ui, sans-serif">Plataforma de streaming</text>

  <!-- Ouvinte -->
  <rect x="30" y="30" width="150" height="56" rx="8" fill="rgb(8, 80, 65)" stroke="rgb(93, 202, 165)" stroke-width="0.5"/>
  <text x="105" y="52" text-anchor="middle" dominant-baseline="central" fill="rgb(159, 225, 203)" font-size="14" font-weight="500" font-family="system-ui, sans-serif">Ouvinte</text>
  <text x="105" y="70" text-anchor="middle" dominant-baseline="central" fill="rgb(93, 202, 165)" font-size="12" font-family="system-ui, sans-serif">Consome músicas</text>

  <!-- Artista -->
  <rect x="30" y="180" width="150" height="56" rx="8" fill="rgb(8, 80, 65)" stroke="rgb(93, 202, 165)" stroke-width="0.5"/>
  <text x="105" y="202" text-anchor="middle" dominant-baseline="central" fill="rgb(159, 225, 203)" font-size="14" font-weight="500" font-family="system-ui, sans-serif">Artista</text>
  <text x="105" y="220" text-anchor="middle" dominant-baseline="central" fill="rgb(93, 202, 165)" font-size="12" font-family="system-ui, sans-serif">Faz upload de conteúdo</text>

  <!-- Administrador -->
  <rect x="30" y="330" width="150" height="56" rx="8" fill="rgb(8, 80, 65)" stroke="rgb(93, 202, 165)" stroke-width="0.5"/>
  <text x="105" y="352" text-anchor="middle" dominant-baseline="central" fill="rgb(159, 225, 203)" font-size="14" font-weight="500" font-family="system-ui, sans-serif">Administrador</text>
  <text x="105" y="370" text-anchor="middle" dominant-baseline="central" fill="rgb(93, 202, 165)" font-size="12" font-family="system-ui, sans-serif">Gerencia plataforma</text>

  <!-- Garage (sistema externo) -->
  <rect x="500" y="30" width="150" height="56" rx="8" fill="rgb(99, 56, 6)" stroke="rgb(239, 159, 39)" stroke-width="0.5"/>
  <text x="575" y="52" text-anchor="middle" dominant-baseline="central" fill="rgb(250, 199, 117)" font-size="14" font-weight="500" font-family="system-ui, sans-serif">Garage</text>
  <text x="575" y="70" text-anchor="middle" dominant-baseline="central" fill="rgb(239, 159, 39)" font-size="12" font-family="system-ui, sans-serif">Storage de objetos (S3)</text>

  <!-- PostgreSQL -->
  <rect x="500" y="180" width="150" height="56" rx="8" fill="rgb(99, 56, 6)" stroke="rgb(239, 159, 39)" stroke-width="0.5"/>
  <text x="575" y="202" text-anchor="middle" dominant-baseline="central" fill="rgb(250, 199, 117)" font-size="14" font-weight="500" font-family="system-ui, sans-serif">PostgreSQL 15</text>
  <text x="575" y="220" text-anchor="middle" dominant-baseline="central" fill="rgb(239, 159, 39)" font-size="12" font-family="system-ui, sans-serif">Dados relacionais</text>

  <!-- Setas: atores → sistema -->
  <line x1="180" y1="58" x2="238" y2="175" marker-end="url(#arrow)" stroke="rgb(156, 154, 146)" stroke-width="1.5"/>
  <line x1="180" y1="208" x2="238" y2="208" marker-end="url(#arrow)" stroke="rgb(156, 154, 146)" stroke-width="1.5"/>
  <line x1="180" y1="358" x2="238" y2="215" marker-end="url(#arrow)" stroke="rgb(156, 154, 146)" stroke-width="1.5"/>

  <!-- Setas: sistema → infra -->
  <line x1="440" y1="175" x2="498" y2="80" marker-end="url(#arrow)" stroke="rgb(156, 154, 146)" stroke-width="1.5"/>
  <line x1="440" y1="208" x2="498" y2="208" marker-end="url(#arrow)" stroke="rgb(156, 154, 146)" stroke-width="1.5"/>

  <!-- Labels de seta -->
  <text x="200" y="122" text-anchor="middle" fill="rgb(194, 192, 182)" font-size="12" font-family="system-ui, sans-serif">navega / ouve</text>
  <text x="200" y="198" text-anchor="middle" fill="rgb(194, 192, 182)" font-size="12" font-family="system-ui, sans-serif">faz upload</text>
  <text x="196" y="296" text-anchor="middle" fill="rgb(194, 192, 182)" font-size="12" font-family="system-ui, sans-serif">administra</text>
  <text x="476" y="120" text-anchor="middle" fill="rgb(194, 192, 182)" font-size="12" font-family="system-ui, sans-serif">armazena áudios</text>
  <text x="474" y="197" text-anchor="middle" fill="rgb(194, 192, 182)" font-size="12" font-family="system-ui, sans-serif">lê / grava dados</text>
</svg>
