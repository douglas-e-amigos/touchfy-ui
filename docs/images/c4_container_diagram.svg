<svg width="100%" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Borda do sistema -->
  <rect x="20" y="30" width="640" height="440" rx="16" fill="none" stroke="rgba(222, 220, 209, 0.3)" stroke-width="0.5" stroke-dasharray="6 4"/>
  <text x="340" y="50" text-anchor="middle" fill="rgb(194, 192, 182)" font-size="12" font-family="system-ui, sans-serif">Limite do sistema</text>

  <!-- Frontend: Next.js -->
  <rect x="220" y="70" width="240" height="70" rx="10" fill="rgb(60, 52, 137)" stroke="rgb(175, 169, 236)" stroke-width="0.5"/>
  <text x="340" y="98" text-anchor="middle" dominant-baseline="central" fill="rgb(206, 203, 246)" font-size="14" font-weight="500" font-family="system-ui, sans-serif">Next.js App</text>
  <text x="340" y="118" text-anchor="middle" dominant-baseline="central" fill="rgb(175, 169, 236)" font-size="12" font-family="system-ui, sans-serif">SPA + SSR seletivo · TypeScript · Hexagonal</text>

  <!-- Backend: Spring Boot -->
  <rect x="165" y="230" width="350" height="70" rx="10" fill="rgb(12, 68, 124)" stroke="rgb(133, 183, 235)" stroke-width="0.5"/>
  <text x="340" y="258" text-anchor="middle" dominant-baseline="central" fill="rgb(181, 212, 244)" font-size="14" font-weight="500" font-family="system-ui, sans-serif">Backend (Spring Boot)</text>
  <text x="340" y="278" text-anchor="middle" dominant-baseline="central" fill="rgb(133, 183, 235)" font-size="12" font-family="system-ui, sans-serif">Java 25 · REST API · Arquitetura Hexagonal</text>

  <!-- PostgreSQL -->
  <rect x="80" y="390" width="180" height="60" rx="10" fill="rgb(99, 56, 6)" stroke="rgb(239, 159, 39)" stroke-width="0.5"/>
  <text x="170" y="414" text-anchor="middle" dominant-baseline="central" fill="rgb(250, 199, 117)" font-size="14" font-weight="500" font-family="system-ui, sans-serif">PostgreSQL 15</text>
  <text x="170" y="434" text-anchor="middle" dominant-baseline="central" fill="rgb(239, 159, 39)" font-size="12" font-family="system-ui, sans-serif">Dados relacionais</text>

  <!-- Garage -->
  <rect x="420" y="390" width="180" height="60" rx="10" fill="rgb(99, 56, 6)" stroke="rgb(239, 159, 39)" stroke-width="0.5"/>
  <text x="510" y="414" text-anchor="middle" dominant-baseline="central" fill="rgb(250, 199, 117)" font-size="14" font-weight="500" font-family="system-ui, sans-serif">Garage</text>
  <text x="510" y="434" text-anchor="middle" dominant-baseline="central" fill="rgb(239, 159, 39)" font-size="12" font-family="system-ui, sans-serif">Áudios · capas · avatares</text>

  <!-- Seta: Frontend → Backend -->
  <line x1="340" y1="140" x2="340" y2="228" marker-end="url(#arrow)" stroke="rgb(156, 154, 146)" stroke-width="1.5"/>
  <text x="358" y="188" text-anchor="start" fill="rgb(194, 192, 182)" font-size="12" font-family="system-ui, sans-serif">HTTPS / REST JSON</text>

  <!-- Seta: Backend → PostgreSQL -->
  <line x1="260" y1="300" x2="200" y2="388" marker-end="url(#arrow)" stroke="rgb(156, 154, 146)" stroke-width="1.5"/>
  <text x="192" y="354" text-anchor="end" fill="rgb(194, 192, 182)" font-size="12" font-family="system-ui, sans-serif">JDBC</text>

  <!-- Seta: Backend → Garage -->
  <line x1="430" y1="300" x2="480" y2="388" marker-end="url(#arrow)" stroke="rgb(156, 154, 146)" stroke-width="1.5"/>
  <text x="488" y="354" text-anchor="start" fill="rgb(194, 192, 182)" font-size="12" font-family="system-ui, sans-serif">S3 API</text>

  <!-- Seta: Frontend → Garage (presigned URL, tracejado) -->
  <path d="M440 105 Q580 105 510 388" fill="none" stroke="rgb(194, 192, 182)" stroke-width="1" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text x="570" y="240" text-anchor="start" fill="rgb(194, 192, 182)" font-size="12" font-family="system-ui, sans-serif">presigned URL</text>
</svg>
